name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install engine deps
        working-directory: engine
        run: npm install --silent
      - name: Install CLI deps (engine tests spawn cli/noggin.mjs which imports @noggin/engine)
        working-directory: cli
        run: npm install --silent
      - name: Run engine tests
        working-directory: engine
        run: npm test

  rpc:
    runs-on: ubuntu-latest
    needs: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install engine deps (rpc protocol depends on engine types)
        working-directory: engine
        run: npm install --silent
      - name: Install rpc deps
        working-directory: rpc
        run: npm install --silent
      - name: Typecheck rpc
        working-directory: rpc
        run: npm run typecheck
      - name: Run rpc tests
        working-directory: rpc
        run: npm test

  cli:
    runs-on: ubuntu-latest
    needs: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install engine deps
        working-directory: engine
        run: npm install --silent
      - name: Install CLI deps
        working-directory: cli
        run: npm install --silent
      - name: Install MCP deps (sync-skill / bundle smoke tests need it)
        working-directory: mcp
        run: npm install --silent
      - name: Syntax check CLI
        working-directory: cli
        run: node --check noggin.mjs
      - name: Syntax check MCP server
        working-directory: mcp
        run: node --check noggin-mcp.mjs
      - name: Smoke test CLI from source
        working-directory: cli
        run: |
          node noggin.mjs --noggin /tmp/noggin-ci.yaml help > /dev/null
          node noggin.mjs --noggin /tmp/noggin-ci.yaml push 'ci root'
          node noggin.mjs --noggin /tmp/noggin-ci.yaml add 'ci child'
          node noggin.mjs --noggin /tmp/noggin-ci.yaml show
      - name: Run CLI smoke tests
        working-directory: cli
        run: npm test
      - name: Run MCP smoke tests
        working-directory: mcp
        run: npm test
      - name: Verify sync is up to date
        run: |
          node scripts/sync-skill.mjs
          git diff --exit-code -- plugin/skills extension/skills \
            || (echo "::error::skills folders are out of sync with engine/+cli/+mcp/. Run: node scripts/sync-skill.mjs" && exit 1)
      - name: Smoke test MCP bundle
        run: node scripts/smoke-test-mcp.mjs
      - name: Smoke test CLI bundle
        run: node scripts/smoke-test-cli.mjs

  extension:
    runs-on: ubuntu-latest
    needs: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install engine deps (sync-skill resolves @noggin/engine from there)
        working-directory: engine
        run: npm install --silent
      - name: Install CLI deps (sync-skill needs esbuild for the bundles)
        working-directory: cli
        run: npm install --silent
      - name: Install MCP deps (sync-skill builds the MCP bundle)
        working-directory: mcp
        run: npm install --silent
      - name: Install rpc deps (extension's symlinked @noggin/rpc imports @noggin/engine from rpc/node_modules on Linux)
        working-directory: rpc
        run: npm install --silent
      - name: Sync skill bundle
        run: node scripts/sync-skill.mjs
      - name: Install extension deps
        working-directory: extension
        run: npm install --silent
      - name: Build extension (host + webview)
        working-directory: extension
        run: npm run build

  ui:
    runs-on: ubuntu-latest
    needs: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install engine deps (sync-skill resolves @noggin/engine from there)
        working-directory: engine
        run: npm install --silent
      - name: Install CLI deps (sync-skill needs esbuild for the bundles)
        working-directory: cli
        run: npm install --silent
      - name: Install MCP deps (sync-skill builds the MCP bundle)
        working-directory: mcp
        run: npm install --silent
      - name: Install rpc deps (ui's symlinked @noggin/rpc imports @noggin/engine from rpc/node_modules on Linux)
        working-directory: rpc
        run: npm install --silent
      - name: Sync skill bundle
        run: node scripts/sync-skill.mjs
      - name: Install ui deps
        working-directory: ui
        run: npm install --silent
      - name: Typecheck ui
        working-directory: ui
        run: npm run typecheck
      - name: Run ui tests
        working-directory: ui
        run: npm test
      - name: Install Playwright Chromium
        working-directory: ui
        run: npx playwright install --with-deps chromium
      - name: Run ui component tests (Playwright CT)
        working-directory: ui
        run: npm run test:ct
      - name: Upload Playwright CT report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-ct-playwright-report
          path: |
            ui/playwright-report/
            ui/test-results/
          retention-days: 7

  playground-e2e:
    runs-on: ubuntu-latest
    needs: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install engine deps
        working-directory: engine
        run: npm install --silent
      - name: Install CLI deps (sync-skill needs esbuild for the bundles)
        working-directory: cli
        run: npm install --silent
      - name: Install MCP deps (sync-skill builds the MCP bundle)
        working-directory: mcp
        run: npm install --silent
      - name: Install rpc deps
        working-directory: rpc
        run: npm install --silent
      - name: Sync skill bundle
        run: node scripts/sync-skill.mjs
      - name: Install ui deps (docs build pulls @noggin/ui from source)
        working-directory: ui
        run: npm install --silent
      - name: Install docs site deps
        working-directory: docs/site
        run: npm install --silent
      - name: Install Playwright Chromium
        working-directory: docs/site
        run: npx playwright install --with-deps chromium
      - name: Run docs site E2E
        working-directory: docs/site
        run: npm run test:e2e
      - name: Upload Playwright E2E report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playground-e2e-report
          path: |
            docs/site/playwright-report/
            docs/site/test-results/
          retention-days: 7
