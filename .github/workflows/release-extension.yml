name: release-extension

# Continuous release for the VS Code extension.
#
# Every push to `main` bumps the extension version, builds, publishes to the
# VS Code Marketplace, and creates a GitHub Release with the .vsix attached.
#
# Bump type defaults to `patch`. Override by including [minor] or [major] in
# the commit message. Skip the release entirely with [skip release].
#
# Loop avoidance: the version-bump commit this workflow creates is itself a
# push to main, which would re-trigger this workflow. We skip when the head
# commit is from `github-actions[bot]` (i.e., our own bump commit), or when
# the commit message has [skip release].
#
# Required repository secret:
#   VSCE_PAT — Azure DevOps Personal Access Token, scope:
#              Organization = All accessible organizations
#              Marketplace  = Manage
#              (See https://aka.ms/vscodepat)

on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to commit the version bump, push tag, create release

concurrency:
  # One release at a time. If two pushes land back-to-back, queue the second
  # so the first finishes its bump-and-push before the second sees stale HEAD.
  group: release-extension
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip our own bump commit (avoid the workflow re-triggering itself) and
    # any commit that opts out with [skip release] in its message. Single-line
    # form so the && stays a YAML scalar operator, not a flow indicator.
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the bump commit can be pushed back.
          fetch-depth: 0
          # Default token can push because permissions.contents: write.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git identity for the bump commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Decide bump type from commit message
        id: bump
        run: |
          msg="${{ github.event.head_commit.message }}"
          if [[ "$msg" == *"[major]"* ]]; then
            kind=major
          elif [[ "$msg" == *"[minor]"* ]]; then
            kind=minor
          else
            kind=patch
          fi
          echo "kind=$kind" >> "$GITHUB_OUTPUT"
          echo "Bump type: $kind"

      - name: Bump extension version
        id: ver
        working-directory: extension
        run: |
          # npm version prints the new version with a leading v; strip it.
          new_with_v=$(npm version ${{ steps.bump.outputs.kind }} --no-git-tag-version)
          new="${new_with_v#v}"
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "tag=extension-v$new" >> "$GITHUB_OUTPUT"
          echo "Bumped to $new"

      - name: Commit bump, push, and tag
        run: |
          git add extension/package.json extension/package-lock.json
          git commit -m "Release extension v${{ steps.ver.outputs.version }} [skip release]"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Sync skill bundle
        run: node scripts/sync-skill.mjs

      - name: Install extension deps
        working-directory: extension
        run: npm install --silent

      - name: Build extension (host + webview)
        working-directory: extension
        run: npm run build

      - name: Package .vsix
        working-directory: extension
        run: npx vsce package --out "noggin-vscode-${{ steps.ver.outputs.version }}.vsix"

      - name: Publish to Marketplace
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath "noggin-vscode-${{ steps.ver.outputs.version }}.vsix"

      - name: Create GitHub Release with .vsix attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Noggin extension ${{ steps.ver.outputs.version }}
          body: |
            VS Code Marketplace: https://marketplace.visualstudio.com/items?itemName=davidorn.noggin-vscode

            See [CHANGELOG.md](https://github.com/dornstein/noggin/blob/main/CHANGELOG.md) for release notes.
          files: extension/noggin-vscode-${{ steps.ver.outputs.version }}.vsix
          draft: false
          prerelease: false
