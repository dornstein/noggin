name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install CLI deps
        working-directory: cli
        run: npm install --silent
      - name: Syntax check CLI
        working-directory: cli
        run: node --check noggin.mjs
      - name: Smoke test CLI
        working-directory: cli
        run: |
          node noggin.mjs --file /tmp/noggin-ci.yaml help > /dev/null
          node noggin.mjs --file /tmp/noggin-ci.yaml push 'ci root'
          node noggin.mjs --file /tmp/noggin-ci.yaml add 'ci child'
          node noggin.mjs --file /tmp/noggin-ci.yaml show
      - name: Run CLI tests
        working-directory: cli
        run: node --test
      - name: Verify sync is up to date
        run: |
          node scripts/sync-skill.mjs
          git diff --exit-code -- plugin/skills extension/skills \
            || (echo "::error::plugin/skills or extension/skills is out of sync with cli/. Run: node scripts/sync-skill.mjs" && exit 1)

  extension:
    runs-on: ubuntu-latest
    needs: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync skill bundle
        run: node scripts/sync-skill.mjs
      - name: Install extension deps
        working-directory: extension
        run: npm install --silent
      - name: Build extension (host + webview)
        working-directory: extension
        run: npm run build
