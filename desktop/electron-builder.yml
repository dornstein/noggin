# electron-builder configuration. Run `npm run release` to produce
# signed installers (and `npm run package` for an unsigned dir build).

appId: com.dornstein.noggin
productName: noggin
copyright: Copyright © 2026 dornstein

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - skills/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/*.tsx"

asar: true
compression: maximum

# Auto-update channel. electron-builder uploads the installer and a
# `latest.yml` feed file to the GitHub Release matching this version;
# electron-updater in the main process reads the same release to check
# for newer versions on each launch. See `src/main/index.ts` for the
# `autoUpdater.checkForUpdatesAndNotify()` call site.
publish:
  provider: github
  owner: dornstein
  repo: noggin
  releaseType: release

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: "noggin-${version}-${os}-${arch}.${ext}"
  signtoolOptions:
    publisherName: dornstein

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: noggin

# Mac and Linux configs are placeholders — Windows is the priority
# per the brief, but adding them later is a small lift.
mac:
  category: public.app-category.productivity
  target:
    - dmg
linux:
  category: Utility
  target:
    - AppImage
