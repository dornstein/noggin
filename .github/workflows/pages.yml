name: pages

# Builds the noggin CLI demo (scripts/build-demo-html.mjs) and publishes it
# to GitHub Pages on every push to main. Source = "GitHub Actions" must be
# enabled in repo Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI deps (needed for js-yaml)
        working-directory: cli
        run: npm install --silent

      - name: Build demo HTML
        run: node scripts/build-demo-html.mjs --out _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
