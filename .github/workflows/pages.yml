name: pages

# Builds the noggin docs site (docs/site/build.mjs) and publishes it
# to GitHub Pages on every push to main. Source = "GitHub Actions" must
# be enabled in repo Settings → Pages.
#
# The site itself includes hand-written markdown pages plus dynamic
# generators that read the live source on every build:
#   - cli/        — from `noggin help`
#   - api/        — from cli/**/*.d.mts (TSDoc release tags)
#   - schema/     — from noggin.schema.json
#   - demo/       — from scripts/build-demo-html.mjs (live CLI runs)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI deps (needed for js-yaml + the CLI binary)
        working-directory: cli
        run: npm install --silent

      - name: Install docs build deps (typedoc, typedoc-plugin-markdown)
        working-directory: docs/site
        run: npm install --silent

      - name: Build docs site
        run: node docs/site/build.mjs --out _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
